openapi: 3.0.3
info:
  title: Relay API
  description: Relay backend API
  version: 1.0.0

tags:
  - name: System
    description: Service health/root endpoint
  - name: Auth
    description: Demo login endpoint
  - name: Batons
    description: Baton CRUD and workflow state updates
  - name: Teams
    description: Team-level risk metrics
  - name: Divisions
    description: Division-level risk metrics
  - name: Persons
    description: Team member lookup and in-office updates

paths:
  /:
    get:
      tags: [System]
      summary: Root health endpoint
      operationId: root
      responses:
        "200":
          description: API is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in with demo credentials
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./components/auth.yaml#/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "./components/auth.yaml#/LoginResponse"
        "401":
          description: Invalid username or password
          content:
            application/json:
              schema:
                $ref: "./components/common.yaml#/Error"

  /batons:
    get:
      tags: [Batons]
      summary: List batons (optional owner/project/team filters)
      operationId: listBatons
      parameters:
        - name: owner_id
          in: query
          required: false
          schema:
            type: integer
        - name: project_id
          in: query
          required: false
          schema:
            type: integer
        - name: team_id
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Matching batons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "./components/baton.yaml#/Baton"
    post:
      tags: [Batons]
      summary: Create baton
      operationId: createBaton
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./components/baton.yaml#/BatonCreate"
      responses:
        "201":
          description: Baton created
          content:
            application/json:
              schema:
                $ref: "./components/baton.yaml#/Baton"

  /batons/{baton_id}:
    get:
      tags: [Batons]
      summary: Get baton by id
      operationId: getBaton
      parameters:
        - name: baton_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Baton
          content:
            application/json:
              schema:
                $ref: "./components/baton.yaml#/Baton"
        "404":
          description: Baton not found
          content:
            application/json:
              schema:
                $ref: "./components/common.yaml#/Error"
    patch:
      tags: [Batons]
      summary: Update baton
      operationId: updateBaton
      parameters:
        - name: baton_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./components/baton.yaml#/BatonUpdate"
      responses:
        "200":
          description: Updated baton
          content:
            application/json:
              schema:
                $ref: "./components/baton.yaml#/Baton"
        "404":
          description: Baton not found
          content:
            application/json:
              schema:
                $ref: "./components/common.yaml#/Error"

  /teams/risk:
    get:
      tags: [Teams]
      summary: Team risk metrics
      operationId: getTeamRisk
      parameters:
        - name: team_id
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Team risk rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamRiskResponse"

  /division/risk:
    get:
      tags: [Divisions]
      summary: Division risk metrics
      operationId: getDivisionRisk
      parameters:
        - name: division_id
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Division risk rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DivisionRiskResponse"

  /people:
    get:
      tags: [Persons]
      summary: List people (optional team filter)
      operationId: listPeople
      parameters:
        - name: team_id
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: People rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PersonResponse"

  /person/{person_id}:
    get:
      tags: [Persons]
      summary: Get person by id
      operationId: getPerson
      parameters:
        - name: person_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Person row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonResponse"
        "404":
          description: Person not found
          content:
            application/json:
              schema:
                $ref: "./components/common.yaml#/Error"
    patch:
      tags: [Persons]
      summary: Update in-office flag
      operationId: updatePerson
      parameters:
        - name: person_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersonUpdate"
      responses:
        "200":
          description: Updated person
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonResponse"
        "404":
          description: Person not found
          content:
            application/json:
              schema:
                $ref: "./components/common.yaml#/Error"

components:
  schemas:
    TeamRiskResponse:
      type: object
      properties:
        team_id: { type: integer }
        team_name: { type: string }
        division_id: { type: integer }
        division_name: { type: string }
        staff_availability_percentage: { type: integer }
        unassigned_baton_count: { type: integer }
        delivery_delay_risk: { type: string }
        overall_risk_score: { type: integer }
      required:
        - team_id
        - team_name
        - division_id
        - division_name
        - staff_availability_percentage
        - unassigned_baton_count
        - delivery_delay_risk
        - overall_risk_score

    DivisionRiskResponse:
      type: object
      properties:
        division_id: { type: integer }
        division_name: { type: string }
        staff_availability_percentage: { type: integer }
        batons_ready_for_handover: { type: integer }
        batons_unassigned: { type: integer }
        overall_risk_score: { type: integer }
      required:
        - division_id
        - division_name
        - staff_availability_percentage
        - batons_ready_for_handover
        - batons_unassigned
        - overall_risk_score

    PersonResponse:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        username: { type: string }
        role: { type: string }
        team_id: { type: integer }
        in_office: { type: boolean }
      required:
        - id
        - name
        - username
        - role
        - team_id
        - in_office

    PersonUpdate:
      type: object
      properties:
        in_office: { type: boolean }
      required:
        - in_office